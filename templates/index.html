<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>BOI AI Assistant</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="chat-container">

    <div class="chat-header">
        BOI AI Biology Assistant
        {% if username %}
        <span style="float:right; font-size:13px; opacity:.85;">
            {{ username }}（学生） · <a href="/logout" style="color:#19c37d; text-decoration:none;">退出</a>
        </span>
        {% endif %}
    </div>

    <div id="chat-box" class="chat-box"></div>

    <div class="input-area">
        <input id="question" type="text" placeholder="输入你的生物问题..." />
        <button onclick="sendMessage()">发送</button>
    </div>

</div>

<script src="/static/main.js"></script>

</body>
</html>
